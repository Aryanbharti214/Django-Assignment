{% extends "blog/base.html" %}

{% block content %}

<h2>Blog Posts</h2>

{% for post in posts %}

<h3>
<a href="{{ post.get_absolute_url }}">
{{ post.title }}
</a>
</h3>

<p>
Author: {{ post.author }} |
Published: {{ post.publish }}
</p>

<p>
{{ post.body|truncatewords:30 }}
</p>

<hr>

{% endfor %}

{% endblock %}
